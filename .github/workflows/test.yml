name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Check formatting
      run: |
        if [ -n "$(gofmt -l .)" ]; then
          echo "Go code is not formatted:"
          gofmt -d .
          exit 1
        fi

    - name: Run tests
      env:
        GOEXPERIMENT: simd
      run: go test -v ./...

    - name: Install golangci-lint
      run: |
        curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin

    - name: Run golangci-lint
      env:
        GOEXPERIMENT: simd
      run: |
        GOROOT=$(go env GOROOT)
        export GOROOT
        export PATH="$(go env GOPATH)/bin:$GOROOT/bin:$PATH"
        golangci-lint run --timeout=5m

  build:
    name: Build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Build
      env:
        GOEXPERIMENT: simd
      run: go build -o bin/mantle ./cmd/mantle

    - name: Build logdiff tool
      env:
        GOEXPERIMENT: simd
      run: go build -o bin/logdiff ./cmd/logdiff
