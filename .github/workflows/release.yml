name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Get version info
      id: version
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        COMMIT=$(git rev-parse HEAD)
        BUILD_TIME=$(date -u +%Y%m%dT%H%M%SZ)
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "commit=${COMMIT}" >> $GITHUB_OUTPUT
        echo "build_time=${BUILD_TIME}" >> $GITHUB_OUTPUT

    - name: Build Linux AMD64
      env:
        GOEXPERIMENT: simd
        GOOS: linux
        GOARCH: amd64
      run: |
        go build \
          -ldflags="-w -s -X 'github.com/samcharles93/mantle/internal/version.Version=${{ steps.version.outputs.version }}' -X 'github.com/samcharles93/mantle/internal/version.Commit=${{ steps.version.outputs.commit }}' -X 'github.com/samcharles93/mantle/internal/version.BuildTime=${{ steps.version.outputs.build_time }}'" \
          -trimpath \
          -o mantle-linux-amd64 \
          ./cmd/mantle

    - name: Build macOS AMD64
      env:
        GOEXPERIMENT: simd
        GOOS: darwin
        GOARCH: amd64
      run: |
        go build \
          -ldflags="-w -s -X 'github.com/samcharles93/mantle/internal/version.Version=${{ steps.version.outputs.version }}' -X 'github.com/samcharles93/mantle/internal/version.Commit=${{ steps.version.outputs.commit }}' -X 'github.com/samcharles93/mantle/internal/version.BuildTime=${{ steps.version.outputs.build_time }}'" \
          -trimpath \
          -o mantle-darwin-amd64 \
          ./cmd/mantle

    - name: Build macOS ARM64
      env:
        GOEXPERIMENT: simd
        GOOS: darwin
        GOARCH: arm64
      run: |
        go build \
          -ldflags="-w -s -X 'github.com/samcharles93/mantle/internal/version.Version=${{ steps.version.outputs.version }}' -X 'github.com/samcharles93/mantle/internal/version.Commit=${{ steps.version.outputs.commit }}' -X 'github.com/samcharles93/mantle/internal/version.BuildTime=${{ steps.version.outputs.build_time }}'" \
          -trimpath \
          -o mantle-darwin-arm64 \
          ./cmd/mantle

    - name: Build Windows AMD64
      env:
        GOEXPERIMENT: simd
        GOOS: windows
        GOARCH: amd64
      run: |
        go build \
          -ldflags="-w -s -X 'github.com/samcharles93/mantle/internal/version.Version=${{ steps.version.outputs.version }}' -X 'github.com/samcharles93/mantle/internal/version.Commit=${{ steps.version.outputs.commit }}' -X 'github.com/samcharles93/mantle/internal/version.BuildTime=${{ steps.version.outputs.build_time }}'" \
          -trimpath \
          -o mantle-windows-amd64.exe \
          ./cmd/mantle

    - name: Create checksums
      run: |
        sha256sum mantle-* > checksums.txt

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          mantle-linux-amd64
          mantle-darwin-amd64
          mantle-darwin-arm64
          mantle-windows-amd64.exe
          checksums.txt
        draft: false
        prerelease: false
        generate_release_notes: true
